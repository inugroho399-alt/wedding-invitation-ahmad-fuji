<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600&family=Pinyon+Script&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-bg-primary: #F9F7F2;
            --color-accent: #B08D57;
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'Montserrat', sans-serif;
            --font-script: 'Pinyon Script', cursive;
        }

        body {
            background-color: var(--color-bg-primary);
            font-family: var(--font-body);
            margin: 0;
            padding: 0;
        }

        .test-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }

        .font-script {
            font-family: var(--font-script);
            font-size: 2rem;
            color: var(--color-accent);
            margin-bottom: 1rem;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: 4rem;
            color: #2D312E;
            margin: 0.5rem 0;
        }

        p {
            font-family: var(--font-body);
            font-size: 1.2rem;
            color: #6B706C;
        }

        .test-button {
            margin-top: 2rem;
            padding: 1rem 3rem;
            background-color: var(--color-accent);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <p class="font-script">The Wedding of</p>
        <h1>Reza & Anjar</h1>
        <p>Sabtu, 12 Agustus 2026</p>
        <button class="test-button">Buka Undangan</button>
    </div>
</body>
</html>
